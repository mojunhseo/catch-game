<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍎 모덩더를 잡아라 🍎</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff5f7; font-family: 'Pretendard', sans-serif; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #basket { position: absolute; bottom: 20px; left: 50%; width: 80px; height: 80px; transform: translateX(-50%); transition: transform 0.1s; z-index: 10; border-radius: 50%; object-fit: cover; }
        .item { position: absolute; width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        #score { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; color: #ff4757; z-index: 20; }
        #timer { position: absolute; top: 20px; right: 20px; font-size: 24px; font-weight: bold; color: #2f3542; z-index: 20; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 100; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score">Score: 0</div>
    <div id="timer">Time: 30</div>
    <img id="basket" src="https://drive.google.com/thumbnail?authuser=0&sz=w200&id=1kYnRv0egLUEcw6aRGmYZxSExHbLVb4RK" alt="바구니">
    
    <div id="msg">
        <h2 id="final-score">게임 종료!</h2>
        <button onclick="location.reload()" style="padding:10px 20px; cursor:pointer; background:#ff4757; color:white; border:none; border-radius:10px;">다시 하기</button>
    </div>
</div>

<script>
    const container = document.getElementById('game-container');
    const basket = document.getElementById('basket');
    const scoreDisplay = document.getElementById('score');
    const timerDisplay = document.getElementById('timer');
    const msg = document.getElementById('msg');
    
    let score = 0;
    let timeLeft = 30;
    let gameActive = true;

    const items = [
        'https://drive.google.com/thumbnail?authuser=0&sz=w50000&id=1F4_1dzst9enTtk9Ne2loh0n1bIUn18NS',
        'https://drive.google.com/thumbnail?authuser=0&sz=w5000&id=1zoXlSgEHBp-Jb2Fq4U3rgtNL6UbSa-Fc'
    ];

    // 이동 로직 (마우스 & 터치)
    function moveBasket(x) {
        if(!gameActive) return;
        let newLeft = x - (basket.offsetWidth / 2);
        if(newLeft < 0) newLeft = 0;
        if(newLeft > window.innerWidth - basket.offsetWidth) newLeft = window.innerWidth - basket.offsetWidth;
        basket.style.left = newLeft + 'px';
        basket.style.transform = 'none'; // 초기 중앙정렬 해제
    }

    window.addEventListener('mousemove', (e) => moveBasket(e.clientX));
    window.addEventListener('touchmove', (e) => {
        e.preventDefault();
        moveBasket(e.touches[0].clientX);
    }, {passive: false});

    function createItem() {
        if (!gameActive) return;
        const item = document.createElement('img');
        item.src = items[Math.floor(Math.random() * items.length)];
        item.classList.add('item');
        item.style.left = Math.random() * (window.innerWidth - 50) + 'px';
        item.style.top = '-50px';
        container.appendChild(item);

        let fallInterval = setInterval(() => {
            if (!gameActive) { clearInterval(fallInterval); item.remove(); return; }
            let top = parseInt(item.style.top);
            item.style.top = (top + 5) + 'px';

            const bRect = basket.getBoundingClientRect();
            const iRect = item.getBoundingClientRect();

            // 충돌 감지
            if (iRect.bottom >= bRect.top && iRect.top <= bRect.bottom && iRect.left < bRect.right && iRect.right > bRect.left) {
                score++;
                scoreDisplay.innerText = "Score: " + score;
                clearInterval(fallInterval);
                item.remove();
            }

            if (top > window.innerHeight) { clearInterval(fallInterval); item.remove(); }
        }, 20);
    }

    let itemGenerator = setInterval(createItem, 800);

    let countdown = setInterval(() => {
        timeLeft--;
        timerDisplay.innerText = "Time: " + timeLeft;
        if (timeLeft <= 0) {
            gameActive = false;
            clearInterval(countdown);
            clearInterval(itemGenerator);
            document.getElementById('final-score').innerText = "최종 점수: " + score + "점!";
            msg.style.display = 'block';
        }
    }, 1000);
</script>

</body>
</html>
